# Unified stack: Flask dashboard + MLflow + Airflow
# Usage:
#   cp .env.example .env   # fill in SUPABASE_URL, SUPABASE_KEY, etc.
#   docker compose up --build
#
# Service URLs:
#   Dashboard  → http://localhost:8080
#   MLflow UI  → http://localhost:5000
#   Airflow UI → http://localhost:8082  (admin / admin)

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file: .env
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW_PROJECT_ROOT: /opt/airflow/project
    MLFLOW_TRACKING_URI: http://mlflow:5000
    OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
    OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - .:/opt/airflow/project
    - mlflow-artifacts:/mlflow/artifacts
  depends_on:
    airflow-postgres:
      condition: service_healthy
    mlflow:
      condition: service_healthy

services:
  # ── MLflow tracking server ─────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_ALLOW_ORIGINS: "*"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Flask dashboard ────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      FLASK_PORT: "8080"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./results:/app/results
      - ./data:/app/data
    depends_on:
      mlflow:
        condition: service_healthy

  # ── Airflow: metadata database ─────────────────────────────────
  airflow-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ── Airflow: one-time init ─────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    restart: "no"

  # ── Airflow: web UI ────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: scheduler ─────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-db:
  mlflow-data:
  mlflow-artifacts:
