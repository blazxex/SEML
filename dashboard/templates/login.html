<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Stock Sentiment Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
        body { background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; }
        .login-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
        .form-control { background: #0d1117; border-color: #30363d; color: #c9d1d9; }
        .form-control:focus { background: #0d1117; border-color: #58a6ff; color: #c9d1d9; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
        .btn-primary { background: #238636; border-color: #238636; }
        .btn-primary:hover { background: #2ea043; border-color: #2ea043; }
        .error-msg { background: #3a0a0a; border: 1px solid #ff4444; border-radius: 6px; padding: 0.6rem 1rem; color: #ff9999; font-size: 0.875rem; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <div style="font-size:2rem;">📈</div>
        <h1>Stock Sentiment</h1>
        <p class="text-secondary small mb-0">SE4ML Demo Dashboard</p>
    </div>

    {% if error %}
    <div class="error-msg mb-3">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label text-secondary small">Username</label>
            <input type="text" name="username" class="form-control" autofocus required />
        </div>
        <div class="mb-4">
            <label class="form-label text-secondary small">Password</label>
            <input type="password" name="password" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
</div>
</body>
</html>
