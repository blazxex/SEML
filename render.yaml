services:
  - type: web
    name: stock-sentiment-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "dashboard.app:app" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "False"
